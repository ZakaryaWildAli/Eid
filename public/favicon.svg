<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0a23"/>
      <stop offset="0.55" stop-color="#1a0f3d"/>
      <stop offset="1" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd1dc"/>
      <stop offset="0.55" stop-color="#ff6fb1"/>
      <stop offset="1" stop-color="#b5179e"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="70%">
      <stop offset="0" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="0.35" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.1" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Heart (optimized for 16–32px favicon sizes) -->
  <path
    d="M16 26.4c-5.05-3.2-9.4-7.1-9.4-12.1 0-2.65 1.95-4.8 4.7-4.8 1.95 0 3.55 1.05 4.7 2.6 1.15-1.55 2.75-2.6 4.7-2.6 2.75 0 4.7 2.15 4.7 4.8 0 5-4.35 8.9-9.4 12.1Z"
    fill="url(#heart)"
    filter="url(#soft)"
  />
  <path
    d="M10.2 12.2c.9-1.2 2.2-1.9 3.7-1.9 1.1 0 2.1.4 2.9 1.2"
    fill="none"
    stroke="rgba(255,255,255,0.55)"
    stroke-width="1.1"
    stroke-linecap="round"
  />

  <!-- Subtle corner glow -->
  <circle cx="10" cy="9" r="10" fill="url(#shine)" opacity="0.7"/>
</svg>
